<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>body{background:#F7F9FC}
.tbl{width:100%;background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--shadow-sm);border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-2);font-weight:700;padding:11px 14px;background:#F8FAFC;border-bottom:1px solid var(--border)}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--border);color:var(--text)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr.hl td{background:var(--info-bg)}
.tbl .pn{font-weight:600;color:var(--navy)}
.tbl .pr{font-weight:700;font-variant-numeric:tabular-nums}
.pill{font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px}
</style></head>
<body>
<table class="tbl">
  <thead><tr><th>Peça</th><th>Categoria</th><th>Preço ML</th><th>Status</th></tr></thead>
  <tbody>
    <tr><td class="pn">Cabeçote</td><td>Motor</td><td class="pr">R$ 1.430</td><td><span class="pill" style="background:var(--success-bg);color:var(--success)">à venda</span></td></tr>
    <tr class="hl"><td class="pn">Câmbio automático</td><td>Transmissão</td><td class="pr">R$ 4.420</td><td><span class="pill" style="background:var(--success-bg);color:var(--success)">à venda</span></td></tr>
    <tr><td class="pn">Farol dianteiro</td><td>Iluminação</td><td class="pr">R$ 340</td><td><span class="pill" style="background:var(--warning-bg);color:var(--warning)">pendente</span></td></tr>
    <tr><td class="pn">Alternador</td><td>Elétrica</td><td class="pr">R$ 310</td><td><span class="pill" style="background:#F1F5F9;color:var(--text-2)">vendida</span></td></tr>
  </tbody>
</table>
</body></html>
