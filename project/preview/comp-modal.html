<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>body{background:#F7F9FC}
.scrim{background:rgba(26,36,64,.55);border-radius:14px;padding:26px;display:flex;justify-content:center}
.modal{width:330px;background:#fff;border-radius:20px;box-shadow:var(--shadow-xl);overflow:hidden}
.modal .top{height:5px;display:flex}.modal .top i{flex:1}
.modal .pad{padding:20px}
.modal h4{margin:0 0 6px;font-size:18px;font-weight:700;color:var(--navy);letter-spacing:-.01em}
.modal p{margin:0 0 16px;font-size:13px;color:var(--text-2);line-height:1.5}
.modal .acts{display:flex;gap:10px;justify-content:flex-end}
.btn{font-size:13px;font-weight:600;border-radius:10px;padding:9px 16px;border:1.5px solid transparent;cursor:pointer}
.btn-primary{background:var(--brand);color:#fff}
.btn-ghost{background:#fff;color:var(--text-2);border-color:var(--border)}
</style></head>
<body>
<div class="scrim">
  <div class="modal">
    <div class="top"><i style="background:#008044"></i><i style="background:#FFCB35"></i></div>
    <div class="pad">
      <h4>Publicar 47 peças?</h4>
      <p>Os anúncios irão para o Mercado Livre com o preço recomendado. Você pode editar cada um depois.</p>
      <div class="acts"><button class="btn btn-ghost">Cancelar</button><button class="btn btn-primary">Publicar tudo</button></div>
    </div>
  </div>
</div>
</body></html>
