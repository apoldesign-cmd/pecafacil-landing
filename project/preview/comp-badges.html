<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.pill{font-size:12px;font-weight:600;padding:5px 11px;border-radius:999px;display:inline-flex;align-items:center;gap:6px}
.dot{width:7px;height:7px;border-radius:999px}
.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;text-transform:uppercase;letter-spacing:.03em}
</style></head>
<body>
<div class="lbl" style="margin-bottom:8px">Status de peça (pills)</div>
<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px">
  <span class="pill" style="background:var(--success-bg);color:var(--success)"><span class="dot" style="background:var(--success)"></span>à venda</span>
  <span class="pill" style="background:var(--warning-bg);color:var(--warning)"><span class="dot" style="background:var(--warning)"></span>pendente</span>
  <span class="pill" style="background:#F1F5F9;color:var(--text-2)"><span class="dot" style="background:var(--text-2)"></span>vendida</span>
  <span class="pill" style="background:var(--info-bg);color:var(--info)"><span class="dot" style="background:var(--info)"></span>rascunho</span>
</div>
<div class="lbl" style="margin-bottom:8px">Etiquetas (badges)</div>
<div style="display:flex;gap:10px;flex-wrap:wrap">
  <span class="badge" style="background:#FEF3E2;color:#B45309">Procurada</span>
  <span class="badge" style="background:var(--navy);color:#fff">Pro</span>
  <span class="badge" style="background:#fff;border:1px solid var(--border);color:var(--text-2)">Em breve</span>
  <span class="badge" style="background:var(--senna-yellow);color:var(--navy)">Mais popular</span>
</div>
</body></html>
