<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>body{background:#F7F9FC}
.kpi{background:#fff;border:1px solid var(--border);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow-sm);width:160px;position:relative;overflow:hidden}
.kpi .strip{position:absolute;left:0;top:0;bottom:0;width:4px;display:flex}
.kpi .strip i{flex:1}
.kpi .k{font-size:12px;color:var(--text-2);font-weight:600;margin-bottom:6px}
.kpi .v{font-size:30px;font-weight:800;color:var(--navy);letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1}
.kpi .d{font-size:12px;font-weight:600;margin-top:6px;display:flex;align-items:center;gap:4px}
</style></head>
<body>
<div style="display:flex;gap:14px;flex-wrap:wrap">
  <div class="kpi"><span class="strip"><i style="background:#008044"></i><i style="background:#FFCB35"></i></span><div class="k">Peças catalogadas</div><div class="v">271</div><div class="d" style="color:var(--success)">▲ +47 hoje</div></div>
  <div class="kpi"><div class="k">Anunciado</div><div class="v">80%</div><div class="d" style="color:var(--text-2)">217 de 271</div></div>
  <div class="kpi"><div class="k">Receita do mês</div><div class="v" style="font-size:24px">R$ 38.4k</div><div class="d" style="color:var(--success)">▲ +30% margem</div></div>
  <div class="kpi"><div class="k">Sucatas</div><div class="v">6</div><div class="d" style="color:var(--text-2)">2 ativas</div></div>
</div>
</body></html>
