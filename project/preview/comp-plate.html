<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>body{background:#F7F9FC}
.plate{width:300px;border-radius:10px;overflow:hidden;border:3px solid #111;background:#fff;box-shadow:var(--shadow-md)}
.plate .top{background:#0A3D91;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:4px 10px;font-size:11px;font-weight:700;letter-spacing:.18em}
.plate .top .br{display:flex;align-items:center;gap:6px}
.plate .flag{width:16px;height:11px;border-radius:2px;background:linear-gradient(#009C3B 0 100%);position:relative}
.plate .flag::after{content:'';position:absolute;inset:2px;background:#FFDF00;clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%)}
.plate .chars{font-size:46px;font-weight:800;letter-spacing:.10em;text-align:center;color:#111;padding:8px 0 10px;font-variant-numeric:tabular-nums}
.plate .merc{font-size:9px;font-weight:700;color:#fff;letter-spacing:.12em}
</style></head>
<body>
<div style="display:flex;gap:20px;align-items:center">
  <div class="plate">
    <div class="top"><span class="merc">MERCOSUL</span><span class="br"><span>BRASIL</span><span class="flag"></span></span></div>
    <div class="chars">ABC1D23</div>
  </div>
  <p class="df-small" style="max-width:200px;margin:0">Placa Mercosul estilizada. Caracteres Inter 800, tracking aberto, tabular. Tarja azul + BRASIL + bandeira.</p>
</div>
</body></html>
