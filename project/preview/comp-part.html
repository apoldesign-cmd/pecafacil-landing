<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>body{background:#F7F9FC}
.part{width:200px;background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--shadow-sm);transition:all var(--dur-base) var(--ease-standard)}
.part.hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.part .photo{height:120px;background:#EEF2F7;position:relative;display:flex;align-items:center;justify-content:center;color:#B6C2D2}
.part .badge{position:absolute;top:8px;left:8px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:3px 8px;border-radius:6px;background:#FEF3E2;color:#B45309}
.part .body{padding:12px 13px}
.part .cat{font-size:11px;color:var(--text-2);font-weight:600;margin-bottom:3px}
.part .name{font-size:15px;font-weight:700;color:var(--navy);letter-spacing:-.01em;margin-bottom:10px}
.part .foot{display:flex;align-items:center;justify-content:space-between}
.part .price{font-size:17px;font-weight:800;color:var(--text);font-variant-numeric:tabular-nums;white-space:nowrap}
.part .foot{gap:8px}
.part .st{font-size:11px;font-weight:600;color:var(--success);background:var(--success-bg);padding:3px 8px;border-radius:999px}
.ico{width:38px;height:38px}
</style></head>
<body>
<div style="display:flex;gap:16px;align-items:flex-start">
  <div class="part hover">
    <div class="photo"><span class="badge">Procurada</span>
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </div>
    <div class="body">
      <div class="cat">Motor · Boa</div>
      <div class="name">Cabeçote</div>
      <div class="foot"><span class="price">R$ 1.430</span><span class="st">à venda</span></div>
    </div>
  </div>
  <p class="df-small" style="max-width:200px;margin:0">Card de produto de peça: foto, etiqueta de procura, categoria · condição, preço sugerido e status. Hover eleva o card.</p>
</div>
</body></html>
