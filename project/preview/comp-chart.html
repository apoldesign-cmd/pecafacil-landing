<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>body{background:#F7F9FC}
.panel{background:#fff;border:1px solid var(--border);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow-sm)}
.bars{display:flex;align-items:flex-end;gap:14px;height:120px;margin-top:10px}
.bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.bar .col{width:100%;border-radius:6px 6px 0 0;background:var(--brand)}
.bar .lab{font-size:10px;color:var(--text-2);font-weight:600}
.legend{display:flex;gap:8px;align-items:center;font-size:12px;color:var(--text-2);margin-top:4px}
</style></head>
<body>
<div style="display:flex;gap:16px;align-items:flex-start">
  <div class="panel" style="width:300px">
    <div style="display:flex;justify-content:space-between;align-items:baseline"><span class="df-h3" style="font-size:15px">Vendas por canal</span><span class="df-small">Maio</span></div>
    <div class="bars">
      <div class="bar"><div class="col" style="height:88%;background:#FFCB35"></div><span class="lab">ML</span></div>
      <div class="bar"><div class="col" style="height:54%"></div><span class="lab">OLX</span></div>
      <div class="bar"><div class="col" style="height:40%"></div><span class="lab">Face</span></div>
      <div class="bar"><div class="col" style="height:62%;background:#008044"></div><span class="lab">Loja</span></div>
    </div>
  </div>
  <p class="df-small" style="max-width:200px;margin:0">Gráficos: barras com cantos arredondados. Amarelo destaca o canal líder, verde a loja própria; demais em brand.</p>
</div>
</body></html>
