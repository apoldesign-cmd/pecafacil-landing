<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>body{background:#F7F9FC}
.call{display:flex;gap:11px;padding:13px 15px;border-radius:12px;font-size:13px;line-height:1.45;max-width:330px}
.call .ic{flex:0 0 auto;width:18px;height:18px;margin-top:1px}
.call b{font-weight:700}
</style></head>
<body>
<div style="display:flex;gap:14px;flex-wrap:wrap">
  <div class="call" style="background:var(--info-bg);color:var(--brand-700)">
    <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="var(--info)" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
    <div><b>Insight</b><br>Anuncie 5 peças de alta procura — vendem mais rápido.</div>
  </div>
  <div class="call" style="background:var(--success-bg);color:#0A5C36">
    <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
    <div><b>Publicado</b><br>4 anúncios no Mercado Livre com preço recomendado.</div>
  </div>
  <div class="call" style="background:var(--warning-bg);color:#92560A">
    <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="var(--warning)" stroke-width="2"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/><path d="M12 9v4M12 17h.01"/></svg>
    <div><b>Atenção</b><br>12 peças sem foto. Anúncios com foto vendem 2× mais.</div>
  </div>
  <div class="call" style="background:var(--danger-bg);color:#9B1C1C">
    <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/></svg>
    <div><b>Erro</b><br>Placa inválida. Use o formato Mercosul ABC1D23.</div>
  </div>
</div>
</body></html>
