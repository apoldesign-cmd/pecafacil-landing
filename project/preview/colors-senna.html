<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div style="display:flex;gap:18px;align-items:center">
  <div style="display:flex;height:90px;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border)">
    <div style="width:30px;background:#008044"></div>
    <div style="width:14px;background:#fff"></div>
    <div style="width:30px;background:#FFCB35"></div>
  </div>
  <div class="card-grid">
    <div class="sw" style="width:150px"><div class="chip" style="background:#008044"></div><span class="name">senna-green</span><span class="hex">#008044</span></div>
    <div class="sw" style="width:150px"><div class="chip" style="background:#FFCB35"></div><span class="name">senna-yellow</span><span class="hex">#FFCB35</span></div>
  </div>
  <p class="df-small" style="max-width:200px;margin:0">Faixas verticais verde+amarelo. Verde sempre lidera. Acentos, divisores, cantos.</p>
</div>
</body></html>
