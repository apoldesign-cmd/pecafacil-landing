<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>body{background:#F7F9FC;padding:16px}
.nav{width:220px;background:#fff;border:1px solid var(--border);border-radius:14px;padding:10px;box-shadow:var(--shadow-sm)}
.nav .item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;font-size:14px;font-weight:600;color:var(--text-2);position:relative;cursor:pointer}
.nav .item svg{width:18px;height:18px}
.nav .item.active{background:var(--info-bg);color:var(--navy)}
.nav .item.active::before{content:'';position:absolute;left:-10px;top:8px;bottom:8px;width:5px;border-radius:0 4px 4px 0;background:linear-gradient(#008044 0 50%,#FFCB35 50% 100%)}
.nav .item:hover:not(.active){background:#F8FAFC;color:var(--text)}
</style></head>
<body>
<div style="display:flex;gap:16px;align-items:flex-start">
  <nav class="nav">
    <div class="item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Painel</div>
    <div class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>Sucatas</div>
    <div class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>Peças</div>
    <div class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg>Vendas</div>
  </nav>
  <p class="df-small" style="max-width:200px;margin:0">Navegação: item ativo com fundo brand-tint e a faixa verde+amarelo na borda esquerda. Ícones Lucide 2px.</p>
</div>
</body></html>
