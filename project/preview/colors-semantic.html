<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-grid">
  <div class="sw" style="width:150px"><div class="chip" style="background:#008044"></div><span class="name">success</span><span class="hex">#008044</span></div>
  <div class="sw" style="width:150px"><div class="chip" style="background:#F59E0B"></div><span class="name">warning</span><span class="hex">#F59E0B</span></div>
  <div class="sw" style="width:150px"><div class="chip" style="background:#EF4444"></div><span class="name">danger</span><span class="hex">#EF4444</span></div>
  <div class="sw" style="width:150px"><div class="chip" style="background:#3B5391"></div><span class="name">info</span><span class="hex">#3B5391</span></div>
</div>
<div style="display:flex;gap:10px;margin-top:14px">
  <span style="font-size:12px;font-weight:600;padding:5px 12px;border-radius:999px;background:var(--success-bg);color:var(--success)">à venda</span>
  <span style="font-size:12px;font-weight:600;padding:5px 12px;border-radius:999px;background:var(--warning-bg);color:var(--warning)">pendente</span>
  <span style="font-size:12px;font-weight:600;padding:5px 12px;border-radius:999px;background:var(--danger-bg);color:var(--danger)">vendida</span>
  <span style="font-size:12px;font-weight:600;padding:5px 12px;border-radius:999px;background:var(--info-bg);color:var(--info)">rascunho</span>
</div>
</body></html>
