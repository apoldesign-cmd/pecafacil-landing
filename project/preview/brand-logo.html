<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>body{background:#fff}
.row{display:flex;gap:30px;align-items:center;flex-wrap:wrap}
.tile{display:flex;flex-direction:column;align-items:center;gap:8px}
.tile .lbl{font-size:11px;color:var(--text-2)}
.onnavy{background:var(--navy);padding:14px 20px;border-radius:12px}
</style></head>
<body>
<div class="row">
  <div class="tile"><img src="../assets/logo-horizontal.svg" height="34"><span class="lbl">Wordmark</span></div>
  <div class="tile"><img src="../assets/logo-mark.svg" height="44"><span class="lbl">Símbolo (engrenagem)</span></div>
  <div class="tile onnavy"><img src="../assets/logo-horizontal.svg" height="30" style="filter:brightness(0) invert(1)"><span class="lbl" style="color:#94A3B8">Sobre navy</span></div>
  <div class="tile"><img src="../assets/senna-stripe.svg" height="44"><span class="lbl">Faixas</span></div>
</div>
</body></html>
